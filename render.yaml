services:
  - type: web
    name: job-matching-engine-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run migrate:deploy
    startCommand: npm start
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
